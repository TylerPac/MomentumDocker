services:
  backend:
    build:
      context: ./backend
    image: momentum-backend:latest
    container_name: momentum-backend
    restart: unless-stopped
    environment:
      # Connects to the shared overkill-mysql container on overkill_net
      SPRING_DATASOURCE_URL: jdbc:mysql://overkill-mysql:3306/${MOMENTUM_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${MOMENTUM_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${MOMENTUM_DB_PASSWORD}
      JWT_SECRET: ${MOMENTUM_JWT_SECRET}
      MOMENTUM_AVATAR_DIR: /data/avatars
    volumes:
      - avatar_data:/data/avatars
    networks:
      - momentum_net
      - overkill_net

  frontend:
    build:
      context: ./frontend
    image: momentum-frontend:latest
    container_name: momentum-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - momentum_net
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.momentum.rule=Host(\"momentum.tylerpac.dev\")"
      - "traefik.http.routers.momentum.entrypoints=websecure"
      - "traefik.http.routers.momentum.tls=true"
      - "traefik.http.routers.momentum.tls.certresolver=myresolver"
      - "traefik.http.services.momentum.loadbalancer.server.port=80"

volumes:
  avatar_data:

networks:
  momentum_net:
    name: momentum_net
  overkill_net:
    external: true
  proxy:
    external: true